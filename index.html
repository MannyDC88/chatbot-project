<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HVAC Assistant - Climate Control Expert</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <h1>❄️🔥 HVAC Assistant</h1>
            <p>Your Climate Control Expert</p>
        </div>

        <!-- Chat Messages Area -->
        <div class="chat-messages" id="chatMessages">
            <!-- Welcome message -->
            <div class="message-box bot-message">
                <div class="message-content">
                    <p>Welcome! I'm your HVAC expert assistant. I can help you with heating, ventilation, air conditioning questions, troubleshooting, maintenance tips, and energy efficiency advice. How can I assist you today?</p>
                </div>
                <div class="message-timestamp">Just now</div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="chat-input-container">
            <div class="input-wrapper">
                <textarea 
                    id="userInput" 
                    placeholder="Ask about HVAC systems, maintenance, troubleshooting..."
                    rows="1"
                    maxlength="2000"
                ></textarea>
                <button id="sendButton" class="send-button" title="Send message">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                    </svg>
                </button>
            </div>
            <div class="input-info">
                <span id="charCount">0/2000</span>
            </div>
        </div>
    </div>

    <!-- Loading Indicator (hidden by default) -->
    <template id="loadingTemplate">
        <div class="message-box bot-message loading">
            <div class="message-content">
                <div class="typing-indicator">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </template>

    <script src="config.js"></script>
    <script src="script.js"></script>
</body>
</html>
